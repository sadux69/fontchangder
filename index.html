<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SADU Ultimate Font Changer</title>

<!-- Google Fonts + Sinhala -->
<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Roboto&family=Noto+Sans+Sinhala&family=Pacifico&family=Orbitron&family=Monoton&family=Lobster&family=Bangers&family=Anton&family=Comfortaa&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;font-family:Poppins;color:white;overflow:hidden;
  background: linear-gradient(270deg,#ff0000,#000,#ff0000);
  background-size:600% 600%;animation:bg 15s infinite;
  display:flex;flex-direction:column;align-items:center;
}
@keyframes bg{0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}}

nav{
  width:100%;display:flex;justify-content:center;
  background:rgba(0,0,0,0.3);padding:10px;backdrop-filter:blur(5px);
  position:sticky;top:0;z-index:10;
}
nav button{
  margin:0 10px;padding:10px 20px;border:none;border-radius:20px;
  background:rgba(255,255,255,0.1);color:white;cursor:pointer;
}
nav button:hover{background:rgba(255,255,255,0.2);}

section{
  display:none;width:90%;max-width:800px;margin-top:20px;text-align:center;
}
section.active{display:block;}

.controls{
  display:flex;flex-wrap:wrap;justify-content:center;
  background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);
  padding:10px;border-radius:20px;margin-bottom:20px;
}

input,button{
  padding:10px;margin:5px;border-radius:20px;
  border:1px solid rgba(255,255,255,0.3);
  background:rgba(255,255,255,0.1);color:white;cursor:pointer;
}

#text{
  font-size:50px;margin-top:20px;text-align:center;text-shadow:2px 2px 10px #000;
}
.popup{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center;
}
.popupBox{
  background:rgba(255,255,255,0.1);padding:20px;border-radius:15px;
  backdrop-filter:blur(15px);max-height:70vh;overflow:auto;color:white;
}
.popup td{
  padding:10px;cursor:pointer;border-bottom:1px solid white;
}
.popup td:hover{background:rgba(255,255,255,0.2);}
#fontSearch{padding:5px;width:90%;margin-bottom:10px;border-radius:10px;border:none;}
canvas{position:fixed;top:0;left:0;z-index:-1;}
.gradientText{
  background:linear-gradient(45deg,#ff0,#f0f,#0ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:gradAnim 3s infinite;
}
@keyframes gradAnim{0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<!-- Navbar -->
<nav>
<button onclick="showSection('home')">Home</button>
<button onclick="showSection('about')">About</button>
<button onclick="showSection('contact')">Contact</button>
</nav>

<!-- Home Section -->
<section id="home" class="active">
<h1>SADU Font Changer Pro</h1>
<div class="controls">
<input id="inputText" placeholder="Type text">
<button id="openFonts">Fonts</button>
<input type="color" id="colorPicker">
<input type="range" id="sizeSlider" min="20" max="120" value="50">
<button id="gradientBtn">Gradient</button>
<button id="copyBtn">Copy</button>
<button id="saveBtn">Save</button>
</div>
<div id="text">Hello</div>
</section>

<!-- About Section -->
<section id="about">
<h1>About</h1>
<p>Advanced online font changer tool with Sinhala fonts support, gradient text, neon glow, copy & save image features.</p>
</section>

<!-- Contact Section -->
<section id="contact">
<h1>Contact</h1>
<p>Email: sadu@example.com</p>
<p>Instagram: @sadu_fonts</p>
</section>

<!-- Font popup -->
<div id="fontPopup" class="popup">
<div class="popupBox">
<h2>Choose Font</h2>
<input type="text" id="fontSearch" placeholder="Search font...">
<table id="fontTable"></table>
<br>
<input id="addFontInput" placeholder="Add Google Font Name">
<button id="addFontBtn">Add Font</button>
<br><br>
<button onclick="closePopup()">Close</button>
</div>
</div>

<script>
// --- Page switching
function showSection(id){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

// --- Home controls
const inputText=document.getElementById("inputText");
const text=document.getElementById("text");
const colorPicker=document.getElementById("colorPicker");
const sizeSlider=document.getElementById("sizeSlider");
const copyBtn=document.getElementById("copyBtn");
const saveBtn=document.getElementById("saveBtn");
const gradientBtn=document.getElementById("gradientBtn");

inputText.oninput=()=>text.innerText=inputText.value;
colorPicker.oninput=()=>text.style.color=colorPicker.value;
sizeSlider.oninput=()=>text.style.fontSize=sizeSlider.value+"px";
gradientBtn.onclick=()=>text.classList.toggle("gradientText");

copyBtn.onclick=()=>{navigator.clipboard.writeText(text.innerText);alert("Text copied!");}
saveBtn.onclick=()=>{html2canvas(text).then(c=>{let a=document.createElement("a");a.href=c.toDataURL();a.download="text.png";a.click();});}

// --- Font popup
const fontPopup=document.getElementById("fontPopup");
document.getElementById("openFonts").onclick=()=>fontPopup.style.display="flex";
function closePopup(){fontPopup.style.display="none";}
const fontTable=document.getElementById("fontTable");
let fonts=["Poppins","Roboto","Pacifico","Orbitron","Monoton","Lobster","Bangers","Anton","Comfortaa","Rubik Glitch","Silkscreen","Noto Sans Sinhala"];

function renderFonts(filter=""){
fontTable.innerHTML="";
fonts.filter(f=>f.toLowerCase().includes(filter.toLowerCase())).forEach(f=>{
let row=document.createElement("tr");
row.innerHTML=`<td style="font-family:'${f}'" onclick="setFont('${f}')">${f}</td>`;
fontTable.appendChild(row);
});
}
renderFonts();

function setFont(f){text.style.fontFamily=f;closePopup();}

// --- Search filter
document.getElementById("fontSearch").oninput=()=>renderFonts(document.getElementById("fontSearch").value);

// --- Add font dynamically
document.getElementById("addFontBtn").onclick=()=>{
let name=document.getElementById("addFontInput").value.trim();
if(!name) return;if(!fonts.includes(name)) fonts.push(name);
let link=document.createElement("link");link.rel="stylesheet";
link.href="https://fonts.googleapis.com/css2?family="+name.replace(" ","+")+"&display=swap";
document.head.appendChild(link);
renderFonts();document.getElementById("addFontInput").value="";
}

// --- Bubble background
let canvas=document.getElementById("bg");let ctx=canvas.getContext("2d");
canvas.width=innerWidth;canvas.height=innerHeight;let bubbles=[];
for(let i=0;i<120;i++){bubbles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*3+1,dy:Math.random()+0.3});}
function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);
bubbles.forEach(b=>{ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fillStyle="white";ctx.fill();b.y-=b.dy;if(b.y<0)b.y=canvas.height;});
requestAnimationFrame(draw);}
draw();
</script>

</body>
</html>
