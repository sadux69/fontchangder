<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>SADU Ultimate Font Changer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Roboto&family=Pacifico&family=Orbitron&family=Monoton&family=Lobster&family=Bangers&family=Anton&family=Comfortaa&family=Rubik+Glitch&family=Silkscreen&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>

body{
margin:0;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-family:Poppins;
color:white;
overflow:hidden;
background: linear-gradient(270deg,#ff0000,#000,#ff0000);
background-size:600% 600%;
animation:bg 15s infinite;
}

@keyframes bg{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

h1{
font-size:40px;
}

.controls{
display:flex;
flex-wrap:wrap;
justify-content:center;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:10px;
border-radius:20px;
}

input,button{
padding:10px;
margin:5px;
border-radius:20px;
border:1px solid rgba(255,255,255,0.3);
background:rgba(255,255,255,0.1);
color:white;
}

#text{
font-size:50px;
margin-top:20px;
}

/* popup */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.popupBox{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:15px;
backdrop-filter:blur(15px);
max-height:70vh;
overflow:auto;
}

.popup td{
padding:10px;
cursor:pointer;
border-bottom:1px solid white;
}

.popup td:hover{
background:rgba(255,255,255,0.2);
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

</style>

</head>

<body>

<canvas id="bg"></canvas>

<h1>SADU Font Changer</h1>

<div class="controls">

<input id="inputText" placeholder="Type text">

<button id="openFonts">Fonts</button>

<input type="color" id="colorPicker">

<input type="range" id="sizeSlider" min="20" max="120" value="50">

<button id="saveBtn">Save</button>

</div>

<div id="text">Hello</div>

<div id="fontPopup" class="popup">

<div class="popupBox">

<h2>Choose Font</h2>

<table>

<tr><td onclick="setFont('Poppins')" style="font-family:Poppins">Poppins</td></tr>
<tr><td onclick="setFont('Roboto')" style="font-family:Roboto">Roboto</td></tr>
<tr><td onclick="setFont('Pacifico')" style="font-family:Pacifico">Pacifico</td></tr>
<tr><td onclick="setFont('Orbitron')" style="font-family:Orbitron">Orbitron</td></tr>
<tr><td onclick="setFont('Monoton')" style="font-family:Monoton">Monoton</td></tr>
<tr><td onclick="setFont('Lobster')" style="font-family:Lobster">Lobster</td></tr>
<tr><td onclick="setFont('Bangers')" style="font-family:Bangers">Bangers</td></tr>
<tr><td onclick="setFont('Anton')" style="font-family:Anton">Anton</td></tr>
<tr><td onclick="setFont('Comfortaa')" style="font-family:Comfortaa">Comfortaa</td></tr>
<tr><td onclick="setFont('Rubik Glitch')" style="font-family:'Rubik Glitch'">Rubik Glitch</td></tr>
<tr><td onclick="setFont('Silkscreen')" style="font-family:Silkscreen">Silkscreen</td></tr>

</table>

<br>

<button onclick="closePopup()">Close</button>

</div>
</div>

<script>

inputText.oninput=()=>{
text.innerText=inputText.value
}

colorPicker.oninput=()=>{
text.style.color=colorPicker.value
}

sizeSlider.oninput=()=>{
text.style.fontSize=sizeSlider.value+"px"
}

openFonts.onclick=()=>{
fontPopup.style.display="flex"
}

function closePopup(){
fontPopup.style.display="none"
}

function setFont(f){
text.style.fontFamily=f
closePopup()
}

saveBtn.onclick=()=>{
html2canvas(text).then(c=>{
let a=document.createElement("a")
a.href=c.toDataURL()
a.download="text.png"
a.click()
})
}


/* bubble background */

let canvas=document.getElementById("bg")
let ctx=canvas.getContext("2d")

canvas.width=innerWidth
canvas.height=innerHeight

let bubbles=[]

for(let i=0;i<120;i++){
bubbles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*3+1,
dy:Math.random()+0.3
})
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

bubbles.forEach(b=>{

ctx.beginPath()
ctx.arc(b.x,b.y,b.r,0,Math.PI*2)
ctx.fillStyle="white"
ctx.fill()

b.y-=b.dy

if(b.y<0){
b.y=canvas.height
}

})

requestAnimationFrame(draw)
}

draw()

</script>

</body>
</html>
