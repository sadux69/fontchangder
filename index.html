<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SADU PARTY MODE</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala&family=Baloo+2&family=Poppins&family=Orbitron&family=Monoton&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>

body{
margin:0;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-family:Poppins;
color:white;
overflow:hidden;

background: linear-gradient(270deg,#ff0000,#000000,#ff0000);
background-size:600% 600%;
animation:bg 15s infinite;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

canvas{
position:fixed;
top:0;
left:0;
z-index:0;
pointer-events:none;
}

h1{
z-index:1;
}

.controls{
z-index:1;
display:flex;
flex-wrap:wrap;
justify-content:center;
}

input,select,button{
margin:5px;
padding:10px;
border-radius:8px;
border:none;
}

#text{
font-size:60px;
z-index:1;
text-shadow:2px 2px 10px black;
transition:0.2s;
}

#text:hover{
transform:scale(1.1);
}

.glitter{
background:linear-gradient(90deg,#fff,#ffd700,#fff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:g 2s infinite;
}

@keyframes g{
0%{background-position:0%}
100%{background-position:100%}
}

</style>
</head>
<body>

<canvas id="fx"></canvas>

<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>

<h1>🔥 SADU PARTY MODE 🔥</h1>

<div class="controls">

<input id="inputText" placeholder="Type">

<select id="fontSelect">
<option>Poppins</option>
<option>Orbitron</option>
<option>Monoton</option>
<option>Noto Sans Sinhala</option>
<option>Baloo 2</option>
</select>

<input type="color" id="color">

<input type="range" min="20" max="120" value="60" id="size">

<label>Glitter</label>
<input type="checkbox" id="gl">

<button id="save">Save</button>

</div>

<div id="text">ආයුබෝවන්</div>

<script>

let text=document.getElementById("text")

inputText.oninput=()=>text.innerText=inputText.value

fontSelect.onchange=()=>text.style.fontFamily=fontSelect.value

color.oninput=()=>text.style.color=color.value

size.oninput=()=>text.style.fontSize=size.value+"px"

gl.onchange=()=>{
if(gl.checked)text.classList.add("glitter")
else text.classList.remove("glitter")
}

save.onclick=()=>{
html2canvas(text).then(c=>{
let a=document.createElement("a")
a.href=c.toDataURL()
a.download="text.png"
a.click()
})
}

document.body.onclick=()=>{
music.play()
}

//// CONFETTI + SPARKLES

let c=document.getElementById("fx")
let x=c.getContext("2d")

c.width=innerWidth
c.height=innerHeight

let p=[]

for(let i=0;i<150;i++){
p.push({
x:Math.random()*c.width,
y:Math.random()*c.height,
r:Math.random()*3,
dx:(Math.random()-0.5)*1,
dy:(Math.random()-0.5)*1
})
}

function draw(){

x.clearRect(0,0,c.width,c.height)

p.forEach(a=>{

x.beginPath()
x.arc(a.x,a.y,a.r,0,6.28)
x.fillStyle="white"
x.fill()

a.x+=a.dx
a.y+=a.dy

if(a.x<0)a.x=c.width
if(a.x>c.width)a.x=0
if(a.y<0)a.y=c.height
if(a.y>c.height)a.y=0

})

requestAnimationFrame(draw)

}

draw()

</script>

</body>
</html>
