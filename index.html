<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SADU Ultimate Font Changer</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala&family=Baloo+2&family=Roboto&family=Pacifico&family=Orbitron&family=Monoton&family=Poppins&display=swap" rel="stylesheet">

<!-- html2canvas -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{
    margin:0;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-family:Poppins;
    color:white;
    overflow:hidden;
    background: linear-gradient(270deg, #ff0000, #000000, #ff0000);
    background-size: 600% 600%;
    animation: gradientBG 20s ease infinite;
}
@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}
#glitterCanvas{
    position:fixed;
    top:0;left:0;width:100%;height:100%;
    pointer-events:none;
    z-index:0;
}
h1{
    font-size:50px;
    margin-bottom:20px;
    text-shadow:2px 2px 10px #000;
    z-index:1;position: relative;
}
input, select, button{
    padding:10px 15px;
    font-size:18px;
    border-radius:8px;border:none;margin:10px;outline:none;
    background: rgba(255,255,255,0.1);
    color:white;
    backdrop-filter: blur(5px);
    cursor:pointer;
    z-index:1;position: relative;
}
#text{
    font-size:50px;
    margin-top:30px;
    text-shadow:2px 2px 8px #000;
    transition: all 0.3s ease;
    position: relative;
    z-index:1;
}
.glitter{
    background: linear-gradient(90deg, #fff, #ffd700, #fff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: glitterAnim 2s infinite;
}
@keyframes glitterAnim{
    0%{background-position:0% 0%;}
    50%{background-position:100% 0%;}
    100%{background-position:0% 0%;}
}
#text:hover{
    transform: scale(1.08);
}
.controls{
    display:flex;flex-wrap:wrap;justify-content:center;margin-bottom:20px;
    z-index:1;position: relative;
}
.controls div{margin:5px 10px;}

/* Symbols popup */
#symbolsPopup{
    display:none;position:fixed;top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,0.8);justify-content:center;align-items:center;z-index:20;
}
#symbolsPopup .popupBox{
    background:rgba(0,0,0,0.2);padding:20px;border-radius:15px;
    backdrop-filter:blur(15px);max-height:70vh;overflow:auto;color:white;
}
#symbolTable td{
    padding:10px;cursor:pointer;border-bottom:1px solid white;
}
#symbolTable td:hover{background:rgba(255,255,255,0.2);}
#symbolSearch{
    padding:5px;width:90%;margin-bottom:10px;border-radius:10px;border:none;
}
</style>
</head>
<body>

<canvas id="glitterCanvas"></canvas>

<audio id="bgMusic" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop autoplay></audio>

<h1>SADU Ultimate Font Changer</h1>

<div class="controls">
<div><input type="text" id="inputText" placeholder="Type here..."></div>
<div>
<select id="fontSelect">
<option value="Poppins">Poppins</option>
<option value="Roboto">Roboto</option>
<option value="Pacifico">Pacifico</option>
<option value="Orbitron">Orbitron</option>
<option value="Monoton">Monoton</option>
<option value="Noto Sans Sinhala">Noto Sans Sinhala</option>
<option value="Baloo 2">Baloo 2</option>
</select>
</div>
<div><label>Text Color:</label><input type="color" id="colorPicker" value="#ffffff"></div>
<div><label>Font Size:</label><input type="range" id="fontSizeSlider" min="20" max="100" value="50"></div>
<div><label>Text Shadow:</label><input type="checkbox" id="shadowToggle" checked></div>
<div><label>Glitter Effect:</label><input type="checkbox" id="glitterToggle"></div>
<div><button id="saveBtn">Save as Image</button></div>
<div><button onclick="openSymbolsPopup()">Symbols</button></div>
</div>

<div id="text">ආයුබෝවන්!</div>

<!-- Symbols Popup -->
<div id="symbolsPopup" class="popup">
  <div class="popupBox">
    <h2>Choose Symbol</h2>
    <input type="text" id="symbolSearch" placeholder="Search symbol...">
    <table id="symbolTable"></table>
    <button onclick="closeSymbolsPopup()">Close</button>
  </div>
</div>

<script>
// --- Update Text ---
document.getElementById("inputText").addEventListener("input", function(){
    document.getElementById("text").innerText = this.value;
});
// --- Change Font ---
document.getElementById("fontSelect").addEventListener("change", function(){
    document.getElementById("text").style.fontFamily = this.value;
});
// --- Text color ---
document.getElementById("colorPicker").addEventListener("input", function(){
    document.getElementById("text").style.color = this.value;
});
// --- Font size ---
document.getElementById("fontSizeSlider").addEventListener("input", function(){
    document.getElementById("text").style.fontSize = this.value + "px";
});
// --- Text shadow toggle ---
document.getElementById("shadowToggle").addEventListener("change", function(){
    if(this.checked){
        document.getElementById("text").style.textShadow = "2px 2px 8px #000";
    } else {
        document.getElementById("text").style.textShadow = "none";
    }
});
// --- Glitter toggle ---
document.getElementById("glitterToggle").addEventListener("change", function(){
    if(this.checked){
        document.getElementById("text").classList.add("glitter");
    } else {
        document.getElementById("text").classList.remove("glitter");
    }
});
// --- Save as image ---
document.getElementById("saveBtn").addEventListener("click", function(){
    html2canvas(document.getElementById("text")).then(function(canvas){
        let link = document.createElement("a");
        link.download = "text-image.png";
        link.href = canvas.toDataURL();
        link.click();
    });
});

// --- Glitter particles background ---
const canvas = document.getElementById("glitterCanvas");
const ctx = canvas.getContext("2d");
let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;

const particles = [];
const particleCount = 150;

for(let i=0;i<particleCount;i++){
    particles.push({
        x: Math.random()*w,
        y: Math.random()*h,
        r: Math.random()*2+1,
        dx: (Math.random()-0.5)*0.7,
        dy: (Math.random()-0.5)*0.7
    });
}

function animate(){
    ctx.clearRect(0,0,w,h);
    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle="rgba(255,255,255,0.9)";
        ctx.fill();
        p.x += p.dx;
        p.y += p.dy;
        if(p.x<0)p.x=w;
        if(p.x>w)p.x=0;
        if(p.y<0)p.y=h;
        if(p.y>h)p.y=0;
    });
    requestAnimationFrame(animate);
}
animate();
window.addEventListener("resize",()=>{ w=canvas.width=window.innerWidth; h=canvas.height=window.innerHeight; });

// --- Optional: click to toggle music ---
document.body.addEventListener("click", function(){
    const audio = document.getElementById("bgMusic");
    if(audio.paused) audio.play();
    else audio.pause();
});

// --- Symbols popup logic ---
const symbolsPopup = document.getElementById("symbolsPopup");
const symbolTable = document.getElementById("symbolTable");

let symbols = ["★","☆","✦","✧","❤","❀","✿","☯","☀","☁","☂","☾","☽","⚡","☘","☕","❄","♞","♪","♫"];

function renderSymbols(filter=""){
    symbolTable.innerHTML="";
    symbols.filter(s=>s.includes(filter)).forEach(s=>{
        let row = document.createElement("tr");
        row.innerHTML = `<td style="font-size:24px" onclick="addSymbol('${s}')">${s}</td>`;
        symbolTable.appendChild(row);
    });
}
function openSymbolsPopup(){ symbolsPopup.style.display="flex"; renderSymbols(); }
function closeSymbolsPopup(){ symbolsPopup.style.display="none"; }
function addSymbol(s){
    const input = document.getElementById("inputText");
    input.value += s;
    document.getElementById("text").innerText = input.value;
}
document.getElementById("symbolSearch").oninput = ()=> renderSymbols(document.getElementById("symbolSearch").value);

</script>

</body>
</html>
